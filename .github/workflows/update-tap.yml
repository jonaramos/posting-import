name: Update Homebrew Tap

on:
  release:
    types: [published]

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "version=${{ github.event.release.tag_name }}" >> $GITHUB_OUTPUT

      - name: Compute sha256 for each binary
        id: hashes
        run: |
          VERSION=${{ github.event.release.tag_name }}

          X86_MAC_URL="https://github.com/jonaramos/posting-import/releases/download/${VERSION}/posting-import-x86_64-apple-darwin.tar.gz"
          ARM_MAC_URL="https://github.com/jonaramos/posting-import/releases/download/${VERSION}/posting-import-aarch64-apple-darwin.tar.gz"
          LINUX_URL="https://github.com/jonaramos/posting-import/releases/download/${VERSION}/posting-import-x86_64-unknown-linux-gnu.tar.gz"

          X86_SHA=$(curl -sL $X86_MAC_URL | shasum -a 256 | cut -d' ' -f1)
          ARM_SHA=$(curl -sL $ARM_MAC_URL | shasum -a 256 | cut -d' ' -f1)
          LINUX_SHA=$(curl -sL $LINUX_URL | shasum -a 256 | cut -d' ' -f1)

          echo "x86_sha=$X86_SHA" >> $GITHUB_OUTPUT
          echo "arm_sha=$ARM_SHA" >> $GITHUB_OUTPUT
          echo "linux_sha=$LINUX_SHA" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: jonaramos/homebrew-tools
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        run: |
          VERSION=${{ github.event.release.tag_name }}
          VERSION_STRIPPED=${VERSION#v}
          sed -i "s/version \".*\"/version \"${VERSION_STRIPPED}\"/" Formula/posting-import.rb
          sed -i "s/sha256 \".*\" # x86_mac_sha/sha256 \"${{ steps.hashes.outputs.x86_sha }}\" # x86_mac_sha/" Formula/posting-import.rb
          sed -i "s/sha256 \".*\" # arm_mac_sha/sha256 \"${{ steps.hashes.outputs.arm_sha }}\" # arm_mac_sha/" Formula/posting-import.rb
          sed -i "s/sha256 \".*\" # linux_sha/sha256 \"${{ steps.hashes.outputs.linux_sha }}\" # linux_sha/" Formula/posting-import.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Formula/posting-import.rb
          git commit -m "Update posting-import to ${{ github.event.release.tag_name }}"
          git push
