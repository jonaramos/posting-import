name: Update Homebrew Tap

on:
  workflow_run:
    workflows: ["Release"]
    types: [completed]

jobs:
  update-tap:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - name: Get version
        id: version
        run: echo "tag=${{ github.event.workflow_run.head_branch }}" >> $GITHUB_OUTPUT

      - name: Compute sha256 for each binary
        id: hashes
        run: |
          VERSION=${{ github.event.workflow_run.head_branch }}

          X86_MAC_URL="https://github.com/jonaramos/posting-import/releases/download/${VERSION}/posting-import-x86_64-apple-darwin.tar.gz"
          ARM_MAC_URL="https://github.com/jonaramos/posting-import/releases/download/${VERSION}/posting-import-aarch64-apple-darwin.tar.gz"
          LINUX_URL="https://github.com/jonaramos/posting-import/releases/download/${VERSION}/posting-import-x86_64-unknown-linux-gnu.tar.gz"

          X86_SHA=$(curl -sL $X86_MAC_URL | shasum -a 256 | cut -d' ' -f1)
          ARM_SHA=$(curl -sL $ARM_MAC_URL | shasum -a 256 | cut -d' ' -f1)
          LINUX_SHA=$(curl -sL $LINUX_URL | shasum -a 256 | cut -d' ' -f1)

          echo "x86_sha=$X86_SHA" >> $GITHUB_OUTPUT
          echo "arm_sha=$ARM_SHA" >> $GITHUB_OUTPUT
          echo "linux_sha=$LINUX_SHA" >> $GITHUB_OUTPUT

      - name: Checkout tap repo
        uses: actions/checkout@v4
        with:
          repository: jonaramos/homebrew-tools
          token: ${{ secrets.TAP_GITHUB_TOKEN }}

      - name: Update formula
        run: |
          VERSION=${{ github.event.workflow_run.head_branch }}
          sed -i "s|version \".*\"|version \"${VERSION#v}\"|" Formula/posting-import.rb
          sed -i "s|REPLACE_WITH_X86_SHA256\|.*x86_64-apple-darwin.*|${{ steps.hashes.outputs.x86_sha }}|" Formula/posting-import.rb
          sed -i "s|REPLACE_WITH_ARM_SHA256\|.*aarch64-apple-darwin.*|${{ steps.hashes.outputs.arm_sha }}|" Formula/posting-import.rb
          sed -i "s|REPLACE_WITH_LINUX_SHA256\|.*linux.*|${{ steps.hashes.outputs.linux_sha }}|" Formula/posting-import.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add Formula/posting-import.rb
          git commit -m "Update posting-import to ${{ github.event.workflow_run.head_branch }}"
          git push

